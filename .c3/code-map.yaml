# C3 code-map: maps component and ref IDs to source file glob patterns.
# Edit patterns, then verify with: c3x coverage

# Components
c3-101:
  - "internal/docker/**"
c3-102:
  - "internal/classifier/**"
c3-103:
  - "internal/ports/**"
c3-104:
  - "internal/socat/**"
c3-105:
  - "internal/caddy/**"
c3-106:
  - "internal/env/**"
c3-107:
  - "internal/daemon/**"
c3-110:
  - "internal/run/**"

# Refs
ref-naming-convention: []
ref-npm-binary-distribution:
  - "npm/**"

# Exclusions (not counted in coverage)
_exclude:
  - "bin/**"
  - "dist/**"
  - "docker/**"
  - "*.md"
  - "*.yaml"
  - "*.yml"
  - "go.mod"
  - "go.sum"
  - "Makefile"
  - ".gitignore"
  - ".github/**"
  - ".c3/**"
